name: Bug report
description: Report a reproducible problem in @nest-native/ai-sdk.
title: "bug: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug. Please include enough detail for maintainers to reproduce it without guessing about your Nest, AI SDK, adapter, or streaming setup.
        Do not paste secrets, API keys, production tokens, private certificates, customer data, or unredacted hostnames.
  - type: textarea
    id: problem
    attributes:
      label: What happened?
      description: Describe the behavior you saw and what you expected instead.
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction
      description: Link to a minimal repo or paste the smallest code snippet that demonstrates the issue.
      placeholder: |
        AiModule.forRoot({
          defaultHeaders: { 'x-app': 'demo' },
        });
    validations:
      required: true
  - type: input
    id: package-version
    attributes:
      label: "@nest-native/ai-sdk version"
      placeholder: "0.0.0"
    validations:
      required: true
  - type: input
    id: nest-version
    attributes:
      label: NestJS version
      placeholder: "11.x"
    validations:
      required: true
  - type: input
    id: ai-version
    attributes:
      label: Vercel AI SDK (ai) version
      placeholder: "5.x"
    validations:
      required: true
  - type: dropdown
    id: adapter
    attributes:
      label: HTTP adapter
      options:
        - Express
        - Fastify
        - other
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - AiModule registration
        - "@AiStream"
        - "@AiAbortSignal"
        - "@AiContext"
        - guards/pipes/interceptors/filters
        - error mapping
        - samples or docs
        - release or CI
        - other
    validations:
      required: true
  - type: textarea
    id: stream-setup
    attributes:
      label: Streaming setup, if relevant
      description: Mention the AI SDK call (streamText, streamObject, streamUI), which response helper you use, and whether the issue is pre-stream or in-stream.
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs
      description: Paste stack traces or command output. Redact secrets, tokens, hostnames, and API keys.
      render: text
  - type: checkboxes
    id: checks
    attributes:
      label: Checklist
      options:
        - label: I removed or redacted secrets and API keys.
          required: true
        - label: I checked the docs and samples for the same pattern.
          required: true
