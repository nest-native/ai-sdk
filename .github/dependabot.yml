version: 2

updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "America/Sao_Paulo"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "chore(deps)"
      prefix-development: "chore(deps-dev)"
      include: "scope"
    groups:
      dev-tooling-minor-patch:
        dependency-type: "development"
        update-types:
          - "minor"
          - "patch"
        patterns:
          - "*"
      nest-ai-peer-minor-patch:
        update-types:
          - "minor"
          - "patch"
        patterns:
          - "ai"
          - "@nestjs/common"
          - "@nestjs/core"
          - "@nestjs/platform-express"
          - "@nestjs/platform-fastify"
          - "@nestjs/testing"
          - "class-validator"
          - "reflect-metadata"
          - "rxjs"
          - "zod"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "America/Sao_Paulo"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "chore(actions)"
      include: "scope"
